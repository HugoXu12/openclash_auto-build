port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
allow-lan: true
mode: rule
log-level: info
ipv6: false


################################
# DNS（防污染核心）
################################
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "rule-set:fakeipfilter_domain"
  default-nameserver:
    - https://223.5.5.5/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query


proxies:
  - name: vless-reality-2
    server: 104.224.152.243
    port: 443
    type: vless
    uuid: 52fee28b-37e4-4787-be2a-c4860b501506
    tls: true
    flow: xtls-rprx-vision
    reality-opts:
      public-key: wgha8uLZhwl0EpTItVi0YMbNYttBqeS822nothwFDAI
    servername: statici.icloud.com
    client-fingerprint: chrome
    network: tcp


proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies:
    - vless-reality-2

  - name: ♻️ 自动选择
    type: url-test
    proxies:
    - vless-reality-2
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🟢 全球直连
    type: select
    proxies:
    - DIRECT

  - name: Google
    type: select
    proxies:
    - ♻️ 自动选择
    - 🚀 节点选择
    icon: https://raw.githubusercontent.com/Vbaethon/HOMOMIX/main/Icon/Color/Google.png

  - name: YouTube
    type: select
    proxies:
    - ♻️ 自动选择
    - 🚀 节点选择
    icon: https://raw.githubusercontent.com/Vbaethon/HOMOMIX/main/Icon/Color/YouTube.png

  - name: AI
    type: select
    proxies:
    - ♻️ 自动选择
    - 🚀 节点选择
    icon: https://raw.githubusercontent.com/Vbaethon/HOMOMIX/main/Icon/Color/AI.png

  - name: Netflix
    type: select
    proxies:
    - ♻️ 自动选择
    - 🚀 节点选择
    icon: https://raw.githubusercontent.com/Vbaethon/HOMOMIX/main/Icon/Color/Netflix_b.png


rule-providers:
  Google:
  type: http
  behavior: classical
  url: https://raw.githubusercontent.com/HugoXu12/openclash_auto-build/refs/heads/main/rules/Google.list
  path: ./ruleset/google.yaml
  interval: 86400

  YouTube:
  type: http
  behavior: classical
  url: https://raw.githubusercontent.com/HugoXu12/openclash_auto-build/refs/heads/main/rules/YouTube.list
  path: ./ruleset/youtube.yaml
  interval: 86400

  AI:
  type: http
  behavior: classical
  url: https://raw.githubusercontent.com/HugoXu12/openclash_auto-build/refs/heads/main/rules/AI.list
  path: ./ruleset/ai.yaml
  interval: 86400

  Netflix:
  type: http
  behavior: classical
  url: https://raw.githubusercontent.com/HugoXu12/openclash_auto-build/refs/heads/main/rules/Netflix.list
  path: ./ruleset/netflix.yaml
  interval: 86400

  Direct_custom:
  type: http
  behavior: classical
  url: https://raw.githubusercontent.com/HugoXu12/openclash_auto-build/refs/heads/main/rules/Direct_custom.list
  path: ./ruleset/direct_custom.yaml
  interval: 86400

  Proxy_custom:
  type: http
  behavior: classical
  url: https://raw.githubusercontent.com/HugoXu12/openclash_auto-build/refs/heads/main/rules/Proxy_custom.list
  path: ./ruleset/proxy_custom.yaml
  interval: 86400

  Direct:
  type: http
  behavior: classical
  url: https://raw.githubusercontent.com/HugoXu12/openclash_auto-build/refs/heads/main/rules/Direct.list
  path: ./ruleset/direct.yaml
  interval: 86400

  Proxy:
  type: http
  behavior: classical
  url: https://raw.githubusercontent.com/HugoXu12/openclash_auto-build/refs/heads/main/rules/Proxy.list
  path: ./ruleset/proxy.yaml
  interval: 86400


rules:
  - RULE-SET,Google,Google
  - RULE-SET,YouTube,YouTube
  - RULE-SET,AI,AI
  - RULE-SET,Netflix,Netflix
  - RULE-SET,Direct_custom,🟢 全球直连
  - RULE-SET,Proxy_custom,🚀 节点选择
  - RULE-SET,Direct,🟢 全球直连
  - RULE-SET,Proxy,🚀 节点选择
  - GEOIP,CN,🟢 全球直连,no-resolve
  - MATCH,🚀 节点选择