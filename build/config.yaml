port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
allow-lan: true
mode: rule
log-level: info
ipv6: false


################################
# DNS（防污染核心）
################################
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "rule-set:fakeipfilter_domain"
  default-nameserver:
    - https://223.5.5.5/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query


proxies:
  - name: HK-2
    type: ss
    server: 3.3.3.2
    port: 1000
    cipher: aes-128-gcm
    password: 123456


proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies:
      - HK-2

  - name: ♻️ 自动选择
    type: url-test
    proxies:
      - HK-2
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🟢 全球直连
    type: select
    proxies:
      - DIRECT

  - name: Google
    type: select
    proxies:
      - ♻️ 自动选择
      - 🚀 节点选择
    icon: https://raw.githubusercontent.com/Vbaethon/HOMOMIX/main/Icon/Color/Google.png

  - name: YouTube
    type: select
    proxies:
      - ♻️ 自动选择
      - 🚀 节点选择
    icon: https://raw.githubusercontent.com/Vbaethon/HOMOMIX/main/Icon/Color/YouTube.png

  - name: AI
    type: select
    proxies:
      - ♻️ 自动选择
      - 🚀 节点选择
    icon: https://raw.githubusercontent.com/Vbaethon/HOMOMIX/main/Icon/Color/AI.png

  - name: Netflix
    type: select
    proxies:
      - ♻️ 自动选择
      - 🚀 节点选择
    icon: https://raw.githubusercontent.com/Vbaethon/HOMOMIX/main/Icon/Color/Netflix_b.png


