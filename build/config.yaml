port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
allow-lan: true
mode: rule
log-level: info
ipv6: false
proxy-groups:
- name: 🚀 节点选择
  type: select
  proxies:
  - US-1
  - US-2
  - UK-1
  - UK-2
  - HK-1
  - HK-2
- name: ♻️ 自动选择
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
  proxies:
  - US-1
  - US-2
  - UK-1
  - UK-2
  - HK-1
  - HK-2
- name: 🟢 全球直连
  type: select
  proxies:
  - DIRECT
- name: Google
  type: select
  icon: https://github.com/Vbaethon/HOMOMIX/blob/main/Icon/Color/Google.png
  proxies:
  - ♻️ 自动选择
  - 🚀 节点选择
- name: YouTube
  type: select
  icon: https://github.com/Vbaethon/HOMOMIX/blob/main/Icon/Color/YouTube.png
  proxies:
  - ♻️ 自动选择
  - 🚀 节点选择
- name: AI
  type: select
  icon: https://github.com/Vbaethon/HOMOMIX/blob/main/Icon/Color/AI.png
  proxies:
  - ♻️ 自动选择
  - 🚀 节点选择
rule-providers:
  Google:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Google/Google.list
    path: ./ruleset/google.yaml
    interval: 86400
  YouTube:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/YouTube.list
    path: ./ruleset/youtube.yaml
    interval: 86400
  AI:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/AI.list
    path: ./ruleset/ai.yaml
    interval: 86400
  ChinaMedia:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaMedia.list
    path: ./ruleset/chinaMedia.yaml
    interval: 86400
  ProxyGFWlist:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyGFWlist.list
    path: ./ruleset/proxygfw.yaml
    interval: 86400
rules:
- '- RULE-SET,Google,Google'
- '- RULE-SET,YouTube,YouTube'
- '- RULE-SET,AI,AI'
- '- RULE-SET,ChinaMedia,🟢 全球直连'
- '- RULE-SET,ProxyGFWlist,🚀 节点选择'
- '- GEOIP,CN,🟢 全球直连,no-resolve'
- '- MATCH,🚀 节点选择'
