name: OpenClash Auto Build

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Init
      run: |
        rm -rf rules build
        mkdir -p rules build

    - name: Run merge
      run: bash scripts/merge.sh

    - name: Generate YAML
      run: python3 scripts/build_yaml.py

    - name: Commit
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add .
        git commit -m "auto build" || echo "no changes"
        git push
