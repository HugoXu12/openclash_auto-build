name: Build OpenClash Config and Rules

on:
  schedule:
    # cron 使用 UTC 时间，UTC 18:00 对应北京时间 02:00
    - cron: '0 18 * * *'
  workflow_dispatch: # 允许手动点击运行

# 必须声明写入权限才能推送到当前仓库
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: pip install pyyaml

      - name: Make script executable
        run: chmod +x scripts/merge.sh

      - name: Run shell script to download and process lists
        run: ./scripts/merge.sh

      - name: Run python script to build YAML
        run: python scripts/build_yaml.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add rules/ tmp/ build/
          
          # 如果没有文件改变，则静默忽略，避免报错停止
          git commit -m "Auto-update OpenClash rules & config" || echo "No changes to commit"
          git push

      # 调试需要：保留过程文件。
      # 之后如果你希望自动删除，只需取消下面这几行的注释即可：
      # - name: Cleanup debug files
