name: OpenClash Auto Build

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl

      - name: Run merge
        run: |
          chmod +x scripts/merge.sh
          bash scripts/merge.sh

      - name: Build YAML
        run: |
          python3 scripts/build_yaml.py

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add .
          git commit -m "Auto update rules & config" || echo "No changes"
          git push
