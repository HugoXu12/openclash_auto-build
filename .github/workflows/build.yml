name: OpenClash Auto Build

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl python3

      - name: Run merge script
        run: |
          chmod +x scripts/merge.sh
          bash scripts/merge.sh

      - name: Build YAML
        run: |
          python3 scripts/build_yaml.py

      - name: Commit changes
        run: |
          git config --global user.name "auto-bot"
          git config --global user.email "auto@github.com"
          git add .
          git commit -m "auto update rules" || echo "no changes"
          git push

      # ====== DEBUG 保留（后续你可以删）======
