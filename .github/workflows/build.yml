name: Auto Build OpenClash Rules

on:
  workflow_dispatch: # 支持手动点击运行
  schedule:
    - cron: '0 18 * * *' # UTC 18:00，即北京时间每天凌晨 2:00

permissions:
  contents: write # 赋予 Action 提交代码的写权限

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Grant execute permission for scripts
        run: chmod +x scripts/merge.sh

      - name: Process Rules (merge.sh)
        run: ./scripts/merge.sh

      - name: Generate config.yaml (build_yaml.py)
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/build_yaml.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # 添加所有生成的文件夹
          git add rules/ tmp/ build/
          git commit -m "Auto update rules and config.yaml" || echo "No changes to commit"
          git push

      # 保留过程文件用于 Debug。如果以后不需要 debug 了，取消下面几行的注释即可。
      # - name: Clean up tmp files
      #   run: |
      #     rm -rf tmp
      #     git add -A
      #     git commit -m "chore: clean up tmp files" || true
      #     git push
