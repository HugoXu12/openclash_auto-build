name: OpenClash Auto Build

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5

      - name: Clean build & rules
        run: |
          rm -rf rules build

      - name: Run merge
        run: |
          chmod +x scripts/merge.sh
          bash scripts/merge.sh

      - name: Build YAML
        run: |
          python3 scripts/build_yaml.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .
          git commit -m "auto update rules" || echo "no changes"
          git push
