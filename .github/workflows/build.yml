name: OpenClash Auto Build

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"   # 北京时间凌晨2点（UTC+8）

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install tools
      run: |
        sudo apt update
        sudo apt install -y curl python3

    - name: Run merge
      run: |
        chmod +x scripts/merge.sh
        ./scripts/merge.sh

    - name: Build YAML
      run: |
        python3 scripts/build_yaml.py

    - name: Commit files
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add .
        git commit -m "Auto build rules & config" || echo "No changes"
        git push

    # ===== 可选清理（先注释，方便你调试）=====
