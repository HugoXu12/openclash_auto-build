name: OpenClash Auto Build

on:
  schedule:
    - cron: '0 18 * * *'   # 北京时间 2点（UTC+8）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install
        run: sudo apt-get install -y curl

      - name: Run merge
        run: |
          chmod +x scripts/merge.sh
          bash scripts/merge.sh

      - name: Build YAML
        run: python3 scripts/build_yaml.py

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "auto build" || echo "no changes"
          git push

      # 调试用（后续你可以删除）
      # - name: Cleanup debug files
      #   run: |
      #     rm -rf rules-src-provisional
